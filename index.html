<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>新幹線ワード当てゲーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>新幹線ワード当てゲーム</h1>

  <div id="game-area">
    <div id="train">こんにちは</div>
  </div>

  <input type="text" id="answer" placeholder="答えを入力">
  <button onclick="checkAnswer()">決定</button>

  <p>ライフ: <span id="life">3</span></p>
  <p>連続正解: <span id="combo">0</span></p>
  <p>スコア: <span id="score">0</span></p>

  <script src="script.js"></script>
</body>
</html>
